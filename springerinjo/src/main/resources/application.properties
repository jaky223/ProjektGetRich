spring.datasource.url=jdbc:postgresql://localhost:5432/getrich_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate settings
# We set validate so Hibernate checks if the DB matches our entities (Code First approach validation)
# But we let Flyway handle the actual schema changes!
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Flyway settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
